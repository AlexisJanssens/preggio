<div class="review-card" [class.expanded]="expanded()">
  <div class="card-body">
    <p #descEl class="description" [class.clamped]="!expanded()">{{ description }}</p>
    @if (overflows()) {
      <button class="read-more" (click)="toggle()">
        {{ expanded() ? 'lire moins' : 'lire plus' }}
      </button>
    }
  </div>
  <div class="author-info">
    <span class="author-name">{{ authorFirstName }}</span>
  </div>
</div>
