<div class="admin-page">
  <header>
    <h1>Découvertes</h1>
    <div class="header-actions">
      <a routerLink="/admin/discoveries/new" class="btn btn-primary">+ Nouvelle</a>
      <button class="btn btn-outline" (click)="logout()">Déconnexion</button>
    </div>
  </header>

  @if (discoveries().length === 0) {
    <div class="empty">
      <p>Aucune découverte dans Firestore.</p>
      <button class="btn btn-outline" (click)="seed()" [disabled]="seeding()">
        {{ seeding() ? 'Import...' : 'Importer les données initiales' }}
      </button>
    </div>
  } @else {
    <table>
      <thead>
        <tr>
          <th>Ordre</th>
          <th>Image</th>
          <th>Titre</th>
          <th>Slug</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (d of discoveries(); track d.id) {
          <tr>
            <td>{{ d.order ?? '-' }}</td>
            <td>
              <img [src]="d.imgPath" [alt]="d.title" class="thumb" />
            </td>
            <td>{{ d.title }}</td>
            <td>{{ d.link }}</td>
            <td class="actions">
              <a [routerLink]="'/admin/discoveries/' + d.id" class="btn btn-sm">Éditer</a>
              <button class="btn btn-sm btn-danger" (click)="delete(d.id!, d.title)">Supprimer</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
