<div class="admin-page">
  <header>
    <h1>Galeries</h1>
    <div class="header-actions">
      <a routerLink="/admin/discoveries" class="btn btn-outline">Découvertes</a>
      <button class="btn btn-outline" (click)="logout()">Déconnexion</button>
    </div>
  </header>

  @if (galleries().length === 0) {
    <div class="empty">
      <p>Aucune galerie dans Firestore.</p>
      <button class="btn btn-outline" (click)="seed()" [disabled]="seeding()">
        {{ seeding() ? 'Création...' : 'Créer les galeries initiales' }}
      </button>
    </div>
  } @else {
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Label</th>
          <th>Images</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (g of galleries(); track g.id) {
          <tr>
            <td class="id-cell">{{ g.id }}</td>
            <td>{{ g.label }}</td>
            <td>{{ g.images?.length ?? 0 }}</td>
            <td class="actions">
              <a [routerLink]="'/admin/galleries/' + g.id" class="btn btn-sm">Éditer</a>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
