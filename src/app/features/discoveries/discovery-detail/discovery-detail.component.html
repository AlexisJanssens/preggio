<div class="container">
  <app-nav-bar
    id="nav-bar"
    [currentPage]="'Expériences'"
    [className]="isNavBarVisible() ? 'nav-container' : 'nav-container hidden'"
  ></app-nav-bar>

  @if (discovery(); as d) {
    @if (d.imgPath) {
      <div class="banner">
        <img class="banner-image" [src]="d.imgPath" alt="Banner Image" />
        <div class="title">
          <h1>{{ d.title }}</h1>
        </div>
      </div>
    }
    <div class="discovery-container">
      <div class="images">
        @for (img of d.imgs; track $index) {
          <div class="discovery-img">
            <img [src]="img" alt="Discovery Image" />
          </div>
        }
      </div>
      <div class="texte">
        @if (d.textTitle) {
          <h3>{{ d.textTitle }}</h3>
        }
        @for (paragraph of d.paragraphs; track $index) {
          <p>{{ paragraph }}</p>
        }
        @if (d.content) {
          <p>{{ d.content }}</p>
        }
      </div>
    </div>
  }
</div>
