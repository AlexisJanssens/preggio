<div class="container">
  <app-nav-bar
    id="nav-bar"
    [currentPage]="'Expériences'"
    [className]="isNavBarVisible() ? 'nav-container' : 'nav-container hidden'"
  ></app-nav-bar>

  @if (discovery(); as d) {
    <div class="title-section">
      <h1>{{ d.title }}</h1>
    </div>
    <div class="discovery-container">
      <div class="images">
        @for (img of d.imgs; track $index) {
          <div class="discovery-img">
            <app-img [src]="img" alt="Discovery Image" [natural]="true" />
          </div>
        }
      </div>
      <div class="texte">
        @if (d.textTitle) {
          <h3>{{ d.textTitle }}</h3>
        }
        @for (paragraph of d.paragraphs; track $index) {
          <p>{{ paragraph }}</p>
        }
        @if (d.content) {
          <p>{{ d.content }}</p>
        }
      </div>
    </div>
  }
</div>
